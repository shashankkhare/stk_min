name: stk_min
version: 0.4.1
description: "A high-performance Flutter wrapper for the Synthesis ToolKit (STK). Features physically modeled musical instruments: Flute, Saxophone, Shakers, and Percussion (Drums, Marimba, Agogo, WoodBlocks). Uses an optimized C++ FFI bridge for low-latency audio synthesis."
homepage: https://github.com/shashankkhare/stk_min
repository: https://github.com/shashankkhare/stk_min
issue_tracker: https://github.com/shashankkhare/stk_min/issues

topics:
  - audio
  - synthesis
  - stk
  - physical-modeling
  - ffi

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.0.0
  plugin_platform_interface: ^2.1.0
  path_provider: ^2.1.3
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.stk_min
        pluginClass: StkMinPlugin
      ios:
        pluginClass: StkMinPlugin
      linux:
        pluginClass: StkMinPlugin
      macos:
        pluginClass: StkMinPlugin
      windows:
        pluginClass: StkMinPlugin

  assets:
    - assets/rawwaves/

